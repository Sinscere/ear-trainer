<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ear Trainer</title>

<style>
    body{
        font-family: Arial;
        text-align:center;
        margin:20px;
    }

    button{
        padding:10px 15px;
        margin:5px;
        font-size:16px;
    }

    select{
        padding:5px;
        font-size:16px;
    }

    .section{
        margin:15px;
    }

    #result{
        font-size:22px;
        margin:15px;
    }

    #score{
        font-size:18px;
        margin:10px;
    }

    #answers{
        max-width:900px;
        margin:auto;
    }
</style>
</head>

<body>

<h1>🎧 Ear Trainer</h1>

<div class="section">

    Тональность:

    <select id="root"></select>

    Лад:

    <select id="scale">
        <option value="major">major</option>
        <option value="minor">minor</option>
    </select>

</div>

<div class="section">

    <label>
        <input type="checkbox" id="chromaticToggle">
        Хроматический режим
    </label>

</div>

<div class="section">

    <button onclick="playTonic()">▶️ Тоника</button>
    <button onclick="newNote()">🎮 Новая нота</button>
    <button onclick="replay()">🔁 Повторить</button>

</div>

<div id="result">
    Нажми "Новая нота"
</div>

<div id="score">
    0 / 0
</div>

<div id="answers"></div>

<script>

const NOTES = [
    "C","C#","D","D#","E","F",
    "F#","G","G#","A","A#","B"
];

const SOLFEGE = [
    "do","re","mi","fa","sol","la","ti"
];

const MAJOR = [0,2,4,5,7,9,11];
const MINOR = [0,2,3,5,7,8,10];

let currentNote = null;

let total = 0;
let correct = 0;

let generatedScale = [];

const audioCtx =
    new (window.AudioContext || window.webkitAudioContext)();

function playFreq(freq){

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.setValueAtTime(
        0.3,
        audioCtx.currentTime
    );

    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + 0.6
    );

    osc.start();

    osc.stop(audioCtx.currentTime + 0.6);
}

function midiToFreq(midi){

    return 440 * Math.pow(
        2,
        (midi - 69) / 12
    );
}

function noteToMidi(note, octave){

    return (octave + 1) * 12 +
        NOTES.indexOf(note);
}

function buildScaleNames(){

    const root =
        document.getElementById("root").value;

    const scaleType =
        document.getElementById("scale").value;

    const rootIndex =
        NOTES.indexOf(root);

    const pattern =
        scaleType === "major"
        ? MAJOR
        : MINOR;

    return pattern.map(
        s => NOTES[(rootIndex + s) % 12]
    );
}

function generateScale(){

    generatedScale = [];

    const root =
        document.getElementById("root").value;

    const scaleNames =
        buildScaleNames();

    const chromatic =
        document.getElementById("chromaticToggle").checked;

    const startMidi =
        noteToMidi(root, 3);

    const endMidi =
        noteToMidi(root, 6);

    for(let midi = startMidi; midi <= endMidi; midi++){

        const noteName =
            NOTES[midi % 12];

        if(chromatic){

            generatedScale.push(midi);

        }else{

            if(scaleNames.includes(noteName)){

                generatedScale.push(midi);
            }
        }
    }
}

function playTonic(){

    const root =
        document.getElementById("root").value;

    const scaleType =
        document.getElementById("scale").value;

    const rootMidi =
        noteToMidi(root, 4);

    let thirdInterval;
    let fifthInterval = 7;

    if(scaleType === "major"){

        thirdInterval = 4;

    }else{

        thirdInterval = 3;
    }

    const pattern = [
        rootMidi,
        rootMidi + thirdInterval,
        rootMidi + fifthInterval,
        rootMidi + thirdInterval,
        rootMidi
    ];

    let i = 0;

    function playNext(){

        if(i >= pattern.length) return;

        playFreq(
            midiToFreq(pattern[i])
        );

        i++;

        setTimeout(playNext, 500);
    }

    playNext();
}

function newNote(){

    if(generatedScale.length === 0){

        generateScale();
    }

    currentNote =
        generatedScale[
            Math.floor(
                Math.random() *
                generatedScale.length
            )
        ];

    total++;

    updateScore();

    playFreq(
        midiToFreq(currentNote)
    );

    document.getElementById("result").innerText =
        "Что это за нота?";
}

function replay(){

    if(currentNote !== null){

        playFreq(
            midiToFreq(currentNote)
        );
    }
}

function checkAnswer(index){

    if(currentNote === null) return;

    const chromatic =
        document.getElementById("chromaticToggle").checked;

    const noteName =
        NOTES[currentNote % 12];

    let correctIndex;

    if(chromatic){

        correctIndex =
            NOTES.indexOf(noteName);

    }else{

        const scale =
            buildScaleNames();

        correctIndex =
            scale.indexOf(noteName);
    }

    if(index === correctIndex){

        correct++;

        document.getElementById("result").innerText =
            "✅ Верно!";

    }else{

        const correctName =
            chromatic
            ? NOTES[correctIndex]
            : SOLFEGE[correctIndex];

        document.getElementById("result").innerText =
            "❌ Неверно. Это было " +
            correctName;
    }

    updateScore();
}

function updateScore(){

    let text;

    if(total === 0){

        text = "0 / 0";

    }else{

        const percent =
            Math.floor(
                correct / total * 100
            );

        text =
            `${correct} / ${total} (${percent}%)`;
    }

    document.getElementById("score").innerText =
        text;
}

function rebuildButtons(){

    const chromatic =
        document.getElementById("chromaticToggle").checked;

    const answers =
        document.getElementById("answers");

    answers.innerHTML = "";

    const labels =
        chromatic
        ? NOTES
        : SOLFEGE;

    labels.forEach((name, i) => {

        const btn =
            document.createElement("button");

        btn.innerText = name;

        btn.onclick =
            () => checkAnswer(i);

        answers.appendChild(btn);
    });

    generateScale();
}

const rootSelect =
    document.getElementById("root");

NOTES.forEach(note => {

    const opt =
        document.createElement("option");

    opt.value = note;
    opt.innerText = note;

    rootSelect.appendChild(opt);
});

rootSelect.value = "C";

document
.getElementById("chromaticToggle")
.addEventListener(
    "change",
    rebuildButtons
);

document
.getElementById("root")
.addEventListener(
    "change",
    generateScale
);

document
.getElementById("scale")
.addEventListener(
    "change",
    generateScale
);

rebuildButtons();
generateScale();

</script>

</body>
</html>
